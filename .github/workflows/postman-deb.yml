name: Package latest Postman as .deb

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"   # daily at 03:17 UTC

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq dpkg-dev fakeroot xz-utils curl

      - name: Get latest Postman version
        id: postman
        run: |
          set -euo pipefail

          # Follow Postman's latest Linux x64 download endpoint
          FINAL_URL="$(curl -fsSLI -o /dev/null -w '%{url_effective}' https://dl.pstmn.io/download/latest/linux64)"
          echo "final_url=$FINAL_URL" >> "$GITHUB_OUTPUT"

          # Try to extract version from redirected URL
          VERSION="$(echo "$FINAL_URL" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)"

          if [ -z "$VERSION" ]; then
            echo "Could not detect Postman version from URL"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          gh release view "v${{ steps.postman.outputs.version }}" >/dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if version already packaged
        if: steps.check_release.outputs.exists == 'true'
        run: |
          echo "Release v${{ steps.postman.outputs.version }} already exists. Nothing to do."
          exit 0

      - name: Download latest Postman
        run: |
          curl -fL "https://dl.pstmn.io/download/latest/linux64" -o postman.tar.gz
          tar -xzf postman.tar.gz

      - name: Build .deb structure
        run: |
          set -euo pipefail

          APP_NAME=postman
          VERSION="${{ steps.postman.outputs.version }}"
          PKG_DIR="${APP_NAME}_${VERSION}_amd64"

          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/opt"
          mkdir -p "${PKG_DIR}/usr/share/applications"
          mkdir -p "${PKG_DIR}/usr/share/pixmaps"
          mkdir -p "${PKG_DIR}/usr/bin"

          mv Postman "${PKG_DIR}/opt/Postman"

          cat > "${PKG_DIR}/DEBIAN/control" <<EOF
          Package: postman
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: GitHub Actions <actions@github.com>
          Depends: libgtk-3-0, libnss3, libxss1, libasound2
          Description: Postman API platform desktop app repackaged as a Debian package
          EOF

          cat > "${PKG_DIR}/usr/share/applications/postman.desktop" <<EOF
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Postman
          Exec=/opt/Postman/Postman
          Icon=postman
          Categories=Development;Utility;
          Terminal=false
          EOF

          ln -s /opt/Postman/Postman "${PKG_DIR}/usr/bin/postman"

          if [ -f "${PKG_DIR}/opt/Postman/app/resources/app/assets/icon.png" ]; then
            cp "${PKG_DIR}/opt/Postman/app/resources/app/assets/icon.png" "${PKG_DIR}/usr/share/pixmaps/postman.png"
          elif [ -f "${PKG_DIR}/opt/Postman/resources/app/assets/icon.png" ]; then
            cp "${PKG_DIR}/opt/Postman/resources/app/assets/icon.png" "${PKG_DIR}/usr/share/pixmaps/postman.png"
          else
            # no icon found; not fatal
            touch "${PKG_DIR}/usr/share/pixmaps/postman.png"
          fi

          fakeroot dpkg-deb --build "${PKG_DIR}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.postman.outputs.version }}" \
            --title "Postman v${{ steps.postman.outputs.version }}" \
            --notes "Automated Debian repackaging of the latest Postman Linux release."

      - name: Upload .deb to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ steps.postman.outputs.version }}" \
            "postman_${{ steps.postman.outputs.version }}_amd64.deb" \
            --clobber
