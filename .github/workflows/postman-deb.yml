name: Package latest Postman as .deb

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.postman.outputs.version }}
      exists: ${{ steps.check_release.outputs.exists }}
    steps:
      - name: Get latest Postman version
        id: postman
        shell: bash
        run: |
          set -euo pipefail

          DOWNLOAD_URL="https://dl.pstmn.io/download/latest/linux64"

          DATE_HDR="$(curl -sI "$DOWNLOAD_URL" | awk 'BEGIN{IGNORECASE=1} /^date:/{sub(/^date:[[:space:]]*/,""); print; exit}')"

          if [ -z "$DATE_HDR" ]; then
            echo "Could not read Date header from $DOWNLOAD_URL"
            exit 1
          fi

          TARGET_NAME="postman-$(date --date="$DATE_HDR" "+%y-%j-%H").tar.gz"
          VERSION_MAJ="$(echo "$TARGET_NAME" | awk -F '.' '{ print $1 }' | awk -F '-' '{ print $2 }')"
          VERSION_MIN="$(echo "$TARGET_NAME" | awk -F '.' '{ print $1 }' | awk -F '-' '{ print $3 }')"
          VERSION_REV="$(echo "$TARGET_NAME" | awk -F '.' '{ print $1 }' | awk -F '-' '{ print $4 }')"
          VERSION="${VERSION_MAJ}.${VERSION_MIN}-${VERSION_REV}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set +e
          gh release view "v${{ steps.postman.outputs.version }}" >/dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-ubuntu:
    needs: detect-version
    if: needs.detect-version.outputs.exists != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            wget \
            fakeroot \
            dpkg-dev \
            desktop-file-utils \
            ca-certificates

      - name: Download latest Postman
        shell: bash
        run: |
          set -euo pipefail
          curl -fL "https://dl.pstmn.io/download/latest/linux64" -o postman.tar.gz
          tar -xzf postman.tar.gz
          test -d Postman

      - name: Build Ubuntu .deb
        id: build_deb
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.detect-version.outputs.version }}"
          PKG_NAME="postman_${VERSION}_amd64_ubuntu.deb"
          BUILD_DIR="build"
          STAGE_DIR="${BUILD_DIR}/postman_${VERSION}_amd64"

          rm -rf "$BUILD_DIR"
          mkdir -p "${STAGE_DIR}/DEBIAN"
          mkdir -p "${STAGE_DIR}/opt"
          mkdir -p "${STAGE_DIR}/usr/bin"
          mkdir -p "${STAGE_DIR}/usr/share/applications"
          mkdir -p "${STAGE_DIR}/usr/share/icons/hicolor/256x256/apps"

          mv Postman "${STAGE_DIR}/opt/Postman"

          cat > "${STAGE_DIR}/DEBIAN/control" <<EOF
          Package: postman
          Version: ${VERSION}
          Section: devel
          Priority: optional
          Architecture: amd64
          Maintainer: GitHub Actions <actions@github.com>
          Depends: libgtk-3-0, libnss3, libxss1, libasound2
          Description: Postman desktop app repackaged as a Debian package
           Postman is an API platform for building and using APIs.
          EOF

          cat > "${STAGE_DIR}/usr/share/applications/postman.desktop" <<EOF
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Postman
          Comment=API Development Environment
          Exec=/opt/Postman/Postman
          Icon=postman
          Terminal=false
          Categories=Development;Utility;
          StartupNotify=true
          EOF

          ln -sf /opt/Postman/Postman "${STAGE_DIR}/usr/bin/postman"

          ICON_CANDIDATES=(
            "${STAGE_DIR}/opt/Postman/app/icons/icon_256x256.png"
            "${STAGE_DIR}/opt/Postman/app/resources/app/assets/icon.png"
            "${STAGE_DIR}/opt/Postman/resources/app/assets/icon.png"
            "${STAGE_DIR}/opt/Postman/usr/share/icons/hicolor/256x256/apps/postman.png"
          )

          for icon in "${ICON_CANDIDATES[@]}"; do
            if [ -f "$icon" ]; then
              cp "$icon" "${STAGE_DIR}/usr/share/icons/hicolor/256x256/apps/postman.png"
              break
            fi
          done

          fakeroot dpkg-deb --build "${STAGE_DIR}" "${PKG_NAME}"
          echo "deb_name=${PKG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload Ubuntu artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-deb
          path: ${{ steps.build_deb.outputs.deb_name }}

  build-debian:
    needs: detect-version
    if: needs.detect-version.outputs.exists != 'true'
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm

    steps:
      - name: Install tools
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y \
            git \
            curl \
            wget \
            fakeroot \
            dpkg-dev \
            desktop-file-utils \
            ca-certificates

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest Postman
        shell: bash
        run: |
          set -euo pipefail
          curl -fL "https://dl.pstmn.io/download/latest/linux64" -o postman.tar.gz
          tar -xzf postman.tar.gz
          test -d Postman

      - name: Build Debian .deb
        id: build_deb
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.detect-version.outputs.version }}"
          PKG_NAME="postman_${VERSION}_amd64_debian.deb"
          BUILD_DIR="build"
          STAGE_DIR="${BUILD_DIR}/postman_${VERSION}_amd64"

          rm -rf "$BUILD_DIR"
          mkdir -p "${STAGE_DIR}/DEBIAN"
          mkdir -p "${STAGE_DIR}/opt"
          mkdir -p "${STAGE_DIR}/usr/bin"
          mkdir -p "${STAGE_DIR}/usr/share/applications"
          mkdir -p "${STAGE_DIR}/usr/share/icons/hicolor/256x256/apps"

          mv Postman "${STAGE_DIR}/opt/Postman"

          cat > "${STAGE_DIR}/DEBIAN/control" <<EOF
          Package: postman
          Version: ${VERSION}
          Section: devel
          Priority: optional
          Architecture: amd64
          Maintainer: GitHub Actions <actions@github.com>
          Depends: libgtk-3-0, libnss3, libxss1, libasound2
          Description: Postman desktop app repackaged as a Debian package
           Postman is an API platform for building and using APIs.
          EOF

          cat > "${STAGE_DIR}/usr/share/applications/postman.desktop" <<EOF
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Postman
          Comment=API Development Environment
          Exec=/opt/Postman/Postman
          Icon=postman
          Terminal=false
          Categories=Development;Utility;
          StartupNotify=true
          EOF

          ln -sf /opt/Postman/Postman "${STAGE_DIR}/usr/bin/postman"

          ICON_CANDIDATES=(
            "${STAGE_DIR}/opt/Postman/app/icons/icon_256x256.png"
            "${STAGE_DIR}/opt/Postman/app/resources/app/assets/icon.png"
            "${STAGE_DIR}/opt/Postman/resources/app/assets/icon.png"
            "${STAGE_DIR}/opt/Postman/usr/share/icons/hicolor/256x256/apps/postman.png"
          )

          for icon in "${ICON_CANDIDATES[@]}"; do
            if [ -f "$icon" ]; then
              cp "$icon" "${STAGE_DIR}/usr/share/icons/hicolor/256x256/apps/postman.png"
              break
            fi
          done

          fakeroot dpkg-deb --build "${STAGE_DIR}" "${PKG_NAME}"
          echo "deb_name=${PKG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload Debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-deb
          path: ${{ steps.build_deb.outputs.deb_name }}

  release:
    needs: [detect-version, build-ubuntu, build-debian]
    if: needs.detect-version.outputs.exists != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show downloaded files
        shell: bash
        run: |
          find dist -type f -name "*.deb" -print

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "v${{ needs.detect-version.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "Postman v${{ needs.detect-version.outputs.version }}" \
            --notes "Automated Postman Debian packages built for Ubuntu and Debian environments."

      - name: Upload both .deb packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f -name "*.deb" -exec gh release upload "v${{ needs.detect-version.outputs.version }}" {} --repo "${{ github.repository }}" --clobber \;